name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Micaelatamir
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FF6B00&color_dots[0]=0D1117&color_dots[2]=00E5CC&color_dots[3]=A855F7&color_dots[4]=FF6B00
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
